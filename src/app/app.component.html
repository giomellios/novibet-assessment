<mat-toolbar color="primary" class="toolbar mat-elevation-z4">
  <div class="toolbar-content">
    <span class="brand">
      <mat-icon class="brand-icon">movie</mat-icon>
      <span class="brand-text">{{ title }}</span>
    </span>
    <span class="spacer"></span>
    <nav class="nav-links">
      <a mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon>search</mat-icon> Search
      </a>
      <a mat-button routerLink="/collections" routerLinkActive="active">
        <mat-icon>collections_bookmark</mat-icon> Collections
      </a>
    </nav>
  </div>
</mat-toolbar>

<main class="content-wrapper">
  <router-outlet></router-outlet>
  <router-outlet name="modal"></router-outlet>
</main>
